[Config]
; ── Cor do wagon no Alien Invasion ────────────────────────────────────────────
; Copie o valor "Color:" que aparece no nó do FlowWhiteboard referente ao Alien.
ColorHex=0xCDE3FE

; Tolerância de cor (0 = exato, aumente se a cor variar levemente)
Tolerance=0

; ── Arquivo de sinal ──────────────────────────────────────────────────────────
; O alien_invasion.py lê este arquivo para saber se a ação concluiu.
; Deixe vazio para usar o padrão: mesmo diretório do .ahk → alien_wagon_done.ini
SignalFile=
