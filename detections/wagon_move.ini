; Copie o valor "Color:" que aparece no nó do FlowWhiteboard.
ColorHex=0xCDE3FE

; Tolerância de cor (0 = exato, aumente se a cor variar levemente)
Tolerance=0

; ── Arquivo de sinal ──────────────────────────────────────────────────────────
